name: sql-optimization-openenv
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent learns to optimize SQL queries.
  The agent is given poorly-written SQL (SELECT *, N+1 subqueries, broken aggregations)
  and must rewrite them to be correct, performant, and follow best practices.
  Built on SQLite with a realistic HR/project schema.

author: sql-openenv
tags:
  - openenv
  - sql
  - optimization
  - real-world
  - code

observation_space:
  type: object
  properties:
    echoed_message:
      type: string
      description: Human-readable status message for the agent.
    task_description:
      type: string
      description: Full description of what the agent needs to accomplish.
    original_query:
      type: string
      description: The original (unoptimized) SQL query to fix.
    schema_info:
      type: string
      description: Full database schema as CREATE TABLE statements.
    last_query_result:
      type: string
      nullable: true
      description: JSON string of first 5 rows from last executed query.
    last_query_error:
      type: string
      nullable: true
      description: Error message if last query failed.
    step:
      type: integer
      description: Current step number.
    done:
      type: boolean
      description: Whether the episode has ended.
    score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Current graded score for this task.

action_space:
  type: object
  properties:
    query:
      type: string
      description: The SQL query to submit as the optimized version.
    message:
      type: string
      description: Optional explanation of what was optimized.
  required:
    - query

reward_range: [-1.0, 1.0]

tasks:
  - id: task_easy
    name: "Fix SELECT * and Add WHERE clause"
    difficulty: easy
    max_steps: 10
    score_range: [0.0, 1.0]

  - id: task_medium
    name: "Optimize N+1 with JOIN"
    difficulty: medium
    max_steps: 10
    score_range: [0.0, 1.0]

  - id: task_hard
    name: "Complex Aggregation with Window Function or Subquery"
    difficulty: hard
    max_steps: 10
    score_range: [0.0, 1.0]

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

docker:
  base_image: python:3.11-slim
  port: 7860
